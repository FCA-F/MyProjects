<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="./cesium/node_modules/cesium/Build/Cesium/Widgets/widgets.css">
    <script src="./cesium/node_modules/cesium/Build/Cesium/Cesium.js"></script>
    <style>
        html,body,#cesiumContainer{width:100%;height:100%;margin:0;padding:0;overflow:hidden}
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <script>
        Cesium.Ion.defaultAccessToken='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIxYTdiYzE2NC1lOTkyLTQyZmEtYWIxNy1kYzUyOWEzZWI5ODAiLCJpZCI6NDEzOTI0LCJpYXQiOjE3NzUzNTc3MzZ9.GKTAtYPpDqexLD4sF7vBfZx_1NbTsqh26FImdc4HWkY';
        
        let viewer=new Cesium.Viewer('cesiumContainer');
        
        async function F_Load(){
            viewer.terrain=await Cesium.createWorldTerrainAsync();
            let tileset=await Cesium.Cesium3DTileset.fromUrl("./data/da_yan_ta/tileset.json");
            viewer.scene.primitives.add(tileset);
            viewer.scene.globe.depthTestAgainstTerrain = false; 
            viewer.zoomTo(tileset)
        }
        F_Load();

        viewer.dataSources.add(
            Cesium.GeoJsonDataSource.load("./data/绘制数据 (1).geojson",{
                fill:Cesium.Color.PINK,
                stroke:Cesium.Color.HOTPINK,
                strokeWidth:5,
            })
        );
        
        
    </script>
</body>
</html>
